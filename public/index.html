<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyPoster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-dim: #8a6a2a;
      --cream: #f0e8d5;
      --dark: #0a0804;
      --red: #8b1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      background: var(--dark);
      color: var(--cream);
      font-family: 'Montserrat', sans-serif;
      overflow: hidden;
    }

    #backdrop {
      position: fixed; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(80px) brightness(0.2) saturate(1.6);
      transform: scale(1.15);
      transition: background-image 1.8s ease;
      z-index: 0;
    }

    #grain {
      position: fixed; inset: 0; opacity: 0.035; z-index: 2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 150px;
      animation: grain 0.3s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{background-position:0 0} 10%{background-position:-5% -10%} 20%{background-position:-15% 5%}
      30%{background-position:7% -25%} 40%{background-position:-5% 25%} 50%{background-position:-15% 10%}
      60%{background-position:15% 0%} 70%{background-position:0 15%} 80%{background-position:3% 35%} 90%{background-position:-10% 10%}
    }

    /* ════ IDLE ════ */
    #idle {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 12px;
      opacity: 0; transition: opacity 1.2s ease;
      pointer-events: none;
      background: var(--dark);
    }
    #idle.visible { opacity: 1; pointer-events: all; }
    #idle-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(40px, 8vw, 100px);
      letter-spacing: 0.25em; color: var(--gold); opacity: 0.1; line-height: 1;
    }
    #idle-clock {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(52px, 8vw, 104px);
      font-weight: 300; color: var(--cream); opacity: 0.15;
      letter-spacing: 0.06em; line-height: 1;
    }
    #idle-date {
      font-size: 11px; font-weight: 300; letter-spacing: 0.4em;
      color: var(--cream); opacity: 0.08; text-transform: uppercase;
    }

    /* ════ NOW PLAYING ════ */
    #now-playing {
      position: fixed; inset: 0; z-index: 5;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #now-playing.visible { opacity: 1; }

    /* Poster — full screen height, centered */
    #poster-container {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
    }
    #poster {
      height: 100vh; width: auto; max-width: 100vw;
      object-fit: cover; display: block;
      filter: brightness(0.88);
      transition: opacity 0.6s ease;
    }
    #poster.hidden { opacity: 0; }

    /* Bottom gradient so info bar is readable */
    #poster-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(0,0,0,0.25) 0%,
        transparent 20%,
        transparent 42%,
        rgba(0,0,0,0.65) 62%,
        rgba(0,0,0,0.96) 80%,
        rgba(0,0,0,1) 100%
      );
    }

    /* ── Top bar ── */
    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 28px 48px; z-index: 6;
    }
    .now-playing-badge {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px; letter-spacing: 0.45em; color: var(--gold);
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 10px var(--red);
      animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
    #top-clock {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 16px;
      color: var(--cream); opacity: 0.4; letter-spacing: 0.1em;
    }

    /* ── Info panel ── */
    #info-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 0 56px 44px; z-index: 6;
    }

    #title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(44px, 6.5vw, 90px);
      line-height: 0.92; letter-spacing: 0.03em;
      color: #fff; margin-bottom: 6px;
      text-shadow: 0 4px 40px rgba(0,0,0,0.9);
    }
    #tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 15px;
      color: var(--gold); opacity: 0.75;
      margin-bottom: 18px; min-height: 20px;
    }

    /* Meta chips */
    #meta-row {
      display: flex; align-items: center;
      gap: 8px; flex-wrap: wrap; margin-bottom: 14px;
    }
    .chip {
      font-size: 9px; font-weight: 600;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 4px 11px;
      border: 1px solid rgba(201,168,76,0.4);
      color: var(--gold); white-space: nowrap;
    }
    .chip.plain {
      border-color: rgba(240,232,213,0.12);
      color: var(--cream); opacity: 0.55; font-weight: 300;
    }
    .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--gold); opacity: 0.25; flex-shrink: 0; }

    #overview {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; line-height: 1.65;
      color: var(--cream); opacity: 0.55;
      max-width: 680px; margin-bottom: 14px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    #cast-row {
      display: flex; align-items: center; gap: 7px;
      margin-bottom: 14px; flex-wrap: wrap;
    }
    .cast-label {
      font-size: 9px; font-weight: 600; letter-spacing: 0.25em;
      text-transform: uppercase; color: var(--gold); opacity: 0.55; margin-right: 2px;
    }
    .cast-name { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--cream); opacity: 0.45; }
    .cast-sep { color: var(--gold); opacity: 0.2; }

    #rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 22px; }
    #stars { color: var(--gold); font-size: 12px; letter-spacing: 3px; }
    #rating-val { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--cream); opacity: 0.35; }

    .progress-times { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .progress-time { font-size: 10px; letter-spacing: 0.15em; color: var(--cream); opacity: 0.3; font-weight: 300; }
    #progress-track { width: 100%; height: 2px; background: rgba(255,255,255,0.06); }
    #progress-fill {
      height: 100%;
      background: linear-gradient(to right, var(--gold-dim), var(--gold));
      width: 0%; transition: width 4s linear; position: relative;
    }
    #progress-fill::after {
      content: ''; position: absolute; right: -4px; top: -3px;
      width: 8px; height: 8px; background: var(--gold); border-radius: 50%;
      box-shadow: 0 0 10px var(--gold);
    }

    .fade { transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade.out { opacity: 0; transform: translateY(6px); }
  </style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="grain"></div>

  <!-- Idle screen -->
  <div id="idle" class="visible">
    <div id="idle-logo">JELLYPOSTER</div>
    <div id="idle-clock">00:00</div>
    <div id="idle-date"></div>
  </div>

  <!-- Now Playing -->
  <div id="now-playing">
    <div id="poster-container">
      <img id="poster" src="" alt="" class="hidden" />
      <div id="poster-overlay"></div>
    </div>

    <div id="top-bar">
      <div class="now-playing-badge"><div class="pulse-dot"></div>Now Playing</div>
      <div id="top-clock"></div>
    </div>

    <div id="info-panel">
      <div id="title" class="fade">—</div>
      <div id="tagline" class="fade"></div>

      <div id="meta-row" class="fade">
        <div class="chip" id="year">—</div>
        <div class="dot-sep"></div>
        <div class="chip plain" id="genre">—</div>
        <div class="dot-sep"></div>
        <div class="chip plain" id="runtime">—</div>
        <div class="dot-sep"></div>
        <div class="chip" id="pg-rating">—</div>
        <div class="dot-sep"></div>
        <div class="chip plain" id="quality">—</div>
      </div>

      <div id="overview" class="fade"></div>

      <div id="cast-row" class="fade"></div>

      <div id="rating-row" class="fade">
        <div id="stars"></div>
        <div id="rating-val"></div>
      </div>

      <div class="progress-times fade">
        <span class="progress-time" id="time-current">0:00</span>
        <span class="progress-time" id="time-total">0:00</span>
      </div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
  </div>

  <script>
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('top-clock').textContent = time;
      document.getElementById('idle-clock').textContent = time;
      document.getElementById('idle-date').textContent = date;
    }
    updateClock();
    setInterval(updateClock, 1000);

    function formatMs(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
        : `${m}:${String(sec).padStart(2,'0')}`;
    }

    function starsFromRating(r) {
      if (!r) return '';
      const n = Math.round(r / 2);
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    function qualityLabel(streams) {
      if (!streams) return null;
      const v = streams.find(s => s.Type === 'Video');
      if (!v) return null;
      const h = v.Height || 0;
      if (h >= 2160) return '4K UHD';
      if (h >= 1080) return '1080p';
      if (h >= 720) return '720p';
      if (h >= 480) return '480p';
      return `${h}p`;
    }

    function renderCast(people) {
      const row = document.getElementById('cast-row');
      row.innerHTML = '';
      const actors = (people || []).filter(p => p.Type === 'Actor').slice(0, 4);
      if (!actors.length) return;
      const label = document.createElement('span');
      label.className = 'cast-label';
      label.textContent = 'Starring';
      row.appendChild(label);
      actors.forEach((a, i) => {
        const name = document.createElement('span');
        name.className = 'cast-name';
        name.textContent = a.Name;
        row.appendChild(name);
        if (i < actors.length - 1) {
          const sep = document.createElement('span');
          sep.className = 'cast-sep';
          sep.textContent = '·';
          row.appendChild(sep);
        }
      });
    }

    let lastItemId = null;

    function showIdle() {
      document.getElementById('idle').classList.add('visible');
      document.getElementById('now-playing').classList.remove('visible');
      document.getElementById('backdrop').style.backgroundImage = '';
      lastItemId = null;
    }

    function updateProgress(pos, runtime) {
      if (!runtime) return;
      document.getElementById('progress-fill').style.width = Math.min(100, (pos / runtime) * 100) + '%';
      document.getElementById('time-current').textContent = formatMs(pos / 10000);
      document.getElementById('time-total').textContent = formatMs(runtime / 10000);
    }

    function showNowPlaying(data) {
      const { item, positionTicks, runtimeTicks } = data;
      const isNew = item.Id !== lastItemId;
      lastItemId = item.Id;

      document.getElementById('idle').classList.remove('visible');

      if (isNew) {
        document.querySelectorAll('.fade').forEach(el => el.classList.add('out'));
        setTimeout(() => {
          if (item.backdropUrl) document.getElementById('backdrop').style.backgroundImage = `url('${item.backdropUrl}')`;

          const posterEl = document.getElementById('poster');
          posterEl.classList.add('hidden');
          if (item.posterUrl) {
            posterEl.onload = () => posterEl.classList.remove('hidden');
            posterEl.src = item.posterUrl;
          }

          document.getElementById('title').textContent = item.Name || '—';
          document.getElementById('tagline').textContent = item.Taglines?.[0] || '';
          document.getElementById('year').textContent = item.ProductionYear || '—';
          document.getElementById('genre').textContent = (item.Genres || []).slice(0, 2).join(' / ') || '—';
          document.getElementById('runtime').textContent = item.RunTimeTicks ? `${Math.floor(item.RunTimeTicks / 600000000)} min` : '—';
          document.getElementById('pg-rating').textContent = item.OfficialRating || '—';
          document.getElementById('quality').textContent = qualityLabel(item.MediaStreams) || '—';
          document.getElementById('overview').textContent = item.Overview || '';

          renderCast(item.People);

          const score = item.CommunityRating;
          document.getElementById('stars').textContent = starsFromRating(score);
          document.getElementById('rating-val').textContent = score ? `${score.toFixed(1)} / 10` : '';

          document.querySelectorAll('.fade').forEach(el => el.classList.remove('out'));
          document.getElementById('now-playing').classList.add('visible');
        }, 500);
      }

      updateProgress(positionTicks, runtimeTicks || item.RunTimeTicks);
    }

    async function poll() {
      try {
        const res = await fetch('/api/now-playing');
        const data = await res.json();
        data ? showNowPlaying(data) : showIdle();
      } catch (e) { console.warn('Poll error:', e); }
    }

    poll();
    setInterval(poll, 5000);
  </script>
</body>
</html>
