<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyPoster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #c9a84c;
      --quality: #5dade2;
      --dark: #0a0804;
      --cream: #f0e8d5;
      --red: #8b1a1a;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: var(--dark); color: var(--cream); font-family: 'Montserrat', sans-serif; overflow: hidden; }

    #backdrop {
      position: fixed; inset: 0; background-size: cover; background-position: center;
      filter: blur(80px) brightness(0.18) saturate(1.6); transform: scale(1.15);
      transition: background-image 1.8s ease; z-index: 0;
    }
    #grain {
      position: fixed; inset: 0; opacity: 0.03; z-index: 2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 150px; animation: grain 0.3s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{background-position:0 0}10%{background-position:-5% -10%}20%{background-position:-15% 5%}
      30%{background-position:7% -25%}40%{background-position:-5% 25%}50%{background-position:-15% 10%}
      60%{background-position:15% 0%}70%{background-position:0 15%}80%{background-position:3% 35%}90%{background-position:-10% 10%}
    }

    /* ── Dim overlay ── */
    #dim-overlay {
      position: fixed; inset: 0; z-index: 50;
      background: rgba(0,0,0,0); pointer-events: none;
      transition: background 2s ease;
    }
    #dim-overlay.dimmed { background: rgba(0,0,0,0.92); pointer-events: all; cursor: pointer; }

    /* ── Settings button ── */
    #settings-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 60;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(10,8,4,0.75); border: 1px solid rgba(201,168,76,0.2);
      color: var(--accent); font-size: 17px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0; transition: opacity 0.4s ease, border-color 0.2s ease;
      backdrop-filter: blur(8px);
    }
    #settings-btn.visible { opacity: 0.45; }
    #settings-btn.visible:hover { opacity: 1; border-color: rgba(201,168,76,0.5); }

    /* ── Settings panel ── */
    #settings-panel {
      position: fixed; bottom: 76px; right: 28px; z-index: 60;
      width: 280px;
      background: rgba(10,8,4,0.97); border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px; padding: 22px;
      backdrop-filter: blur(20px);
      opacity: 0; pointer-events: none; transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
      max-height: 80vh; overflow-y: auto;
    }
    #settings-panel.open { opacity: 1; pointer-events: all; transform: translateY(0); }
    .s-title { font-family: 'Bebas Neue', sans-serif; font-size: 12px; letter-spacing: 0.45em; color: var(--accent); opacity: 0.7; margin-bottom: 16px; }
    .s-section { font-size: 8px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--cream); opacity: 0.25; margin: 14px 0 10px; }
    .s-row { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .s-label { font-size: 10px; letter-spacing: 0.1em; color: var(--cream); opacity: 0.5; }
    .s-row input[type=color] { width: 44px; height: 26px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04); cursor: pointer; padding: 2px; }
    .s-row input[type=text], .s-row input[type=number] {
      width: 120px; padding: 5px 8px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
      color: var(--cream); font-size: 10px; font-family: 'Montserrat', sans-serif;
      letter-spacing: 0.05em;
    }
    .s-row select {
      width: 120px; padding: 5px 8px; border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.06);
      color: var(--cream); font-size: 10px;
    }
    .s-toggle { position: relative; width: 36px; height: 20px; }
    .s-toggle input { opacity: 0; width: 0; height: 0; }
    .s-slider { position: absolute; inset: 0; background: rgba(255,255,255,0.1); border-radius: 20px; cursor: pointer; transition: background 0.3s; }
    .s-slider::before { content: ''; position: absolute; height: 14px; width: 14px; left: 3px; bottom: 3px; background: rgba(240,232,213,0.4); border-radius: 50%; transition: transform 0.3s, background 0.3s; }
    .s-toggle input:checked + .s-slider { background: rgba(201,168,76,0.3); }
    .s-toggle input:checked + .s-slider::before { transform: translateX(16px); background: var(--accent); }
    .s-divider { height: 1px; background: rgba(201,168,76,0.08); margin: 14px 0; }
    .s-btn { width: 100%; padding: 8px; border-radius: 6px; border: 1px solid rgba(255,255,255,0.08); background: rgba(255,255,255,0.04); color: rgba(240,232,213,0.4); font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-bottom: 6px; }
    .s-btn:hover { background: rgba(255,255,255,0.08); color: rgba(240,232,213,0.7); }

    /* ════ SCREENSAVER ════ */
    #screensaver {
      position: fixed; inset: 0; z-index: 8;
      opacity: 0; transition: opacity 1.5s ease; pointer-events: none;
    }
    #screensaver.visible { opacity: 1; pointer-events: all; }
    #ss-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 1.5s ease; }
    #ss-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.3) 0%, transparent 30%, rgba(0,0,0,0.7) 70%, rgba(0,0,0,0.95) 100%); }
    #ss-info { position: absolute; bottom: 52px; left: 52px; right: 52px; }
    #ss-title { font-family: 'Montserrat', sans-serif; font-size: clamp(36px, 5vw, 72px); font-weight: 800; color: #fff; line-height: 1; margin-bottom: 8px; letter-spacing: -1px; }
    #ss-meta { font-size: 12px; color: var(--accent); opacity: 0.7; letter-spacing: 0.2em; font-weight: 600; text-transform: uppercase; margin-bottom: 6px; }
    #ss-overview { font-family: 'Cormorant Garamond', serif; font-size: 16px; color: var(--cream); opacity: 0.5; line-height: 1.6; max-width: 600px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #ss-progress { position: absolute; bottom: 0; left: 0; height: 2px; background: var(--accent); opacity: 0.4; transition: width 0.5s linear; }

    /* ════ IDLE ════ */
    #idle {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      opacity: 0; transition: opacity 1s ease; pointer-events: none; overflow: hidden;
    }
    #idle.visible { opacity: 1; pointer-events: all; }

    #idle-header { display: flex; align-items: center; justify-content: space-between; padding: 28px 48px 20px; flex-shrink: 0; }
    #idle-logo { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.5em; color: var(--accent); opacity: 0.4; }
    .idle-right { display: flex; align-items: center; gap: 24px; }
    #weather-widget { display: flex; align-items: center; gap: 10px; opacity: 0; transition: opacity 0.5s; }
    #weather-widget.loaded { opacity: 1; }
    #weather-icon { font-size: 22px; }
    .weather-info { text-align: right; }
    #weather-temp { font-family: 'Montserrat', sans-serif; font-size: 18px; font-weight: 700; color: var(--cream); opacity: 0.35; line-height: 1; }
    #weather-desc { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--cream); opacity: 0.2; margin-top: 2px; }
    .idle-clock-wrap { text-align: right; }
    #idle-clock { font-family: 'Cormorant Garamond', serif; font-size: clamp(28px, 4vw, 52px); font-weight: 300; color: var(--cream); opacity: 0.18; letter-spacing: 0.06em; line-height: 1; }
    #idle-date { font-size: 9px; font-weight: 300; letter-spacing: 0.35em; color: var(--cream); opacity: 0.1; text-transform: uppercase; margin-top: 2px; }

    .idle-divider { height: 1px; background: var(--accent); opacity: 0.07; margin: 0 48px; }
    .idle-section { padding: 18px 48px 0; flex-shrink: 0; }
    .idle-section-label { font-family: 'Bebas Neue', sans-serif; font-size: 10px; letter-spacing: 0.5em; color: var(--accent); opacity: 0.5; margin-bottom: 14px; display: flex; align-items: center; gap: 12px; }
    .idle-section-label::after { content: ''; flex: 1; height: 1px; background: var(--accent); opacity: 0.1; }

    .poster-row { display: flex; gap: 12px; overflow: hidden; }
    .poster-card { flex-shrink: 0; width: 90px; }
    .poster-card-img { width: 90px; height: 135px; object-fit: cover; display: block; border-radius: 4px; border: 1px solid rgba(255,255,255,0.07); background: #1a1510; transition: transform 0.3s ease; }
    .poster-card:hover .poster-card-img { transform: translateY(-3px); }
    .poster-card-placeholder { width: 90px; height: 135px; border-radius: 4px; background: #1a1510; border: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; font-size: 7px; letter-spacing: 0.2em; color: #3a3020; font-family: 'Bebas Neue', sans-serif; }
    .poster-card-title { font-size: 8px; font-weight: 700; color: var(--cream); opacity: 0.6; margin-top: 6px; line-height: 1.3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .poster-card-meta { font-size: 7px; font-weight: 300; color: var(--cream); opacity: 0.28; margin-top: 2px; }
    .poster-card-date { font-size: 7px; font-weight: 600; color: var(--accent); opacity: 0.6; margin-top: 2px; }
    .no-data { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--cream); opacity: 0.15; padding: 12px 0; }

    /* ════ NOW PLAYING ════ */
    #now-playing { position: fixed; inset: 0; z-index: 5; opacity: 0; transition: opacity 0.8s ease; }
    #now-playing.visible { opacity: 1; }

    #poster-container { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #poster { height: 100vh; width: auto; max-width: 100vw; object-fit: cover; display: block; filter: brightness(0.85); transition: opacity 0.6s ease; }
    #poster.hidden { opacity: 0; }

    /* Paused overlay */
    #paused-overlay {
      position: absolute; inset: 0; z-index: 7;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
    }
    #paused-overlay.visible { opacity: 1; }
    #paused-icon { font-size: 80px; color: rgba(240,232,213,0.15); line-height: 1; }

    #poster-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, rgba(0,0,0,0.28) 0%, transparent 18%, transparent 38%, rgba(0,0,0,0.6) 58%, rgba(0,0,0,0.95) 78%, rgba(0,0,0,1) 100%); }

    #top-bar { position: absolute; top: 0; left: 0; right: 0; display: flex; align-items: center; justify-content: space-between; padding: 24px 44px; z-index: 6; }
    .now-playing-badge { display: flex; align-items: center; gap: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 0.5em; color: var(--accent); }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--red); box-shadow: 0 0 10px var(--red); animation: pulse 2s ease-in-out infinite; flex-shrink: 0; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.3;transform:scale(0.6)} }
    #top-right { display: flex; align-items: center; gap: 16px; }
    #top-clock { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--cream); opacity: 0.35; letter-spacing: 0.1em; }
    #watching-users { font-size: 9px; letter-spacing: 0.15em; color: var(--cream); opacity: 0.25; text-transform: uppercase; }

    #info-panel { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 48px 36px; z-index: 6; }

    /* TV show info */
    #show-info { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--accent); opacity: 0.7; margin-bottom: 5px; min-height: 16px; font-weight: 600; }

    #title { font-family: 'Montserrat', sans-serif; font-size: clamp(38px, 5.5vw, 84px); font-weight: 800; line-height: 0.95; letter-spacing: -1px; color: #fff; margin-bottom: 6px; text-shadow: 0 2px 40px rgba(0,0,0,0.9); }
    #tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 14px; color: var(--accent); opacity: 0.75; margin-bottom: 14px; min-height: 18px; }

    #meta-row { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-bottom: 11px; }
    .chip { font-size: 8px; font-weight: 700; letter-spacing: 0.2em; text-transform: uppercase; padding: 3px 9px; border-radius: 2px; white-space: nowrap; }
    .chip-accent { background: rgba(201,168,76,0.12); color: var(--accent); border: 1px solid rgba(201,168,76,0.25); }
    .chip-plain { background: rgba(255,255,255,0.05); color: rgba(240,232,213,0.5); border: 1px solid rgba(255,255,255,0.07); font-weight: 400; }
    .chip-quality { background: rgba(93,173,226,0.12); color: var(--quality); border: 1px solid rgba(93,173,226,0.22); }

    #overview { font-family: 'Cormorant Garamond', serif; font-size: 14px; line-height: 1.65; color: var(--cream); opacity: 0.48; max-width: 620px; margin-bottom: 10px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    #crew-cast-row { display: flex; align-items: center; gap: 6px; margin-bottom: 9px; flex-wrap: wrap; }
    .crew-label { font-size: 8px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); opacity: 0.45; margin-right: 2px; }
    .crew-sep-big { width: 1px; height: 10px; background: rgba(201,168,76,0.2); margin: 0 6px; }
    .cast-name { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--cream); opacity: 0.38; }
    .cast-sep { color: var(--accent); opacity: 0.18; font-size: 11px; }
    .director-name { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--cream); opacity: 0.38; }

    #rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    #stars { color: var(--accent); font-size: 11px; letter-spacing: 2px; }
    #rating-val { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 12px; color: var(--cream); opacity: 0.28; }
    #trailer-qr { display: none; align-items: center; gap: 8px; margin-left: 16px; }
    #trailer-qr.visible { display: flex; }
    #trailer-qr canvas { border-radius: 4px; }
    #trailer-label { font-size: 8px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--cream); opacity: 0.25; }

    /* Up next */
    #up-next { display: none; align-items: center; gap: 12px; margin-bottom: 16px; padding: 10px 14px; background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.07); border-radius: 4px; max-width: 400px; }
    #up-next.visible { display: flex; }
    #up-next-poster { width: 36px; height: 54px; object-fit: cover; border-radius: 2px; opacity: 0.7; flex-shrink: 0; }
    #up-next-info {}
    #up-next-label { font-size: 7px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--accent); opacity: 0.5; margin-bottom: 3px; }
    #up-next-title { font-size: 11px; font-weight: 600; color: var(--cream); opacity: 0.6; line-height: 1.3; }
    #up-next-sub { font-size: 9px; color: var(--cream); opacity: 0.3; margin-top: 2px; }

    .progress-times { display: flex; justify-content: space-between; margin-bottom: 6px; }
    .progress-time { font-size: 9px; letter-spacing: 0.15em; color: var(--cream); opacity: 0.25; font-weight: 300; }
    #progress-track { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; }
    #progress-fill { height: 100%; border-radius: 2px; background: var(--accent); width: 0%; transition: width 4s linear; position: relative; }
    #progress-fill::after { content: ''; position: absolute; right: -4px; top: -3px; width: 9px; height: 9px; background: var(--accent); border-radius: 50%; box-shadow: 0 0 8px var(--accent); }

    .fade { transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade.out { opacity: 0; transform: translateY(6px); }
  </style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="grain"></div>
  <div id="dim-overlay"></div>

  <!-- Settings -->
  <button id="settings-btn" title="Settings">⚙</button>
  <div id="settings-panel">
    <div class="s-title">JellyPoster Settings</div>

    <div class="s-section">Appearance</div>
    <div class="s-row"><span class="s-label">Accent colour</span><input type="color" id="pick-accent" value="#c9a84c" /></div>
    <div class="s-row"><span class="s-label">Quality badge colour</span><input type="color" id="pick-quality" value="#5dade2" /></div>

    <div class="s-section">Weather</div>
    <div class="s-row"><span class="s-label">City</span><input type="text" id="pick-city" placeholder="e.g. Brisbane" /></div>
    <div class="s-row"><span class="s-label">Units</span>
      <select id="pick-units">
        <option value="C">Celsius (°C)</option>
        <option value="F">Fahrenheit (°F)</option>
      </select>
    </div>

    <div class="s-section">Screensaver</div>
    <div class="s-row"><span class="s-label">Poster screensaver</span><label class="s-toggle"><input type="checkbox" id="pick-screensaver" checked /><span class="s-slider"></span></label></div>
    <div class="s-row"><span class="s-label">Screensaver delay</span>
      <select id="pick-ss-delay">
        <option value="60">1 min</option>
        <option value="120">2 min</option>
        <option value="300" selected>5 min</option>
        <option value="600">10 min</option>
      </select>
    </div>

    <div class="s-section">Display</div>
    <div class="s-row"><span class="s-label">Auto-dim after idle</span>
      <select id="pick-dim">
        <option value="0">Never</option>
        <option value="600">10 min</option>
        <option value="1800" selected>30 min</option>
        <option value="3600">1 hour</option>
      </select>
    </div>
    <div class="s-row"><span class="s-label">Show trailer QR</span><label class="s-toggle"><input type="checkbox" id="pick-trailer" checked /><span class="s-slider"></span></label></div>
    <div class="s-row"><span class="s-label">Show up next</span><label class="s-toggle"><input type="checkbox" id="pick-upnext" checked /><span class="s-slider"></span></label></div>

    <div class="s-divider"></div>
    <button class="s-btn" id="settings-reset">Reset to defaults</button>
  </div>

  <!-- Screensaver -->
  <div id="screensaver">
    <div id="ss-bg"></div>
    <div id="ss-overlay"></div>
    <div id="ss-info">
      <div id="ss-meta"></div>
      <div id="ss-title"></div>
      <div id="ss-overview"></div>
    </div>
    <div id="ss-progress"></div>
  </div>

  <!-- Idle -->
  <div id="idle" class="visible">
    <div id="idle-header">
      <div id="idle-logo">JellyPoster</div>
      <div class="idle-right">
        <div id="weather-widget">
          <div id="weather-icon"></div>
          <div class="weather-info">
            <div id="weather-temp"></div>
            <div id="weather-desc"></div>
          </div>
        </div>
        <div class="idle-clock-wrap">
          <div id="idle-clock">00:00</div>
          <div id="idle-date"></div>
        </div>
      </div>
    </div>
    <div class="idle-divider"></div>
    <div class="idle-section">
      <div class="idle-section-label">Recently Added</div>
      <div class="poster-row" id="recently-added-row"></div>
    </div>
    <div class="idle-section" style="margin-top:18px">
      <div class="idle-section-label">Coming Soon</div>
      <div class="poster-row" id="coming-soon-row"></div>
    </div>
  </div>

  <!-- Now Playing -->
  <div id="now-playing">
    <div id="poster-container">
      <img id="poster" src="" alt="" class="hidden" />
      <div id="poster-overlay"></div>
    </div>
    <div id="paused-overlay"><div id="paused-icon">⏸</div></div>
    <div id="top-bar">
      <div class="now-playing-badge"><div class="pulse-dot"></div>Now Playing</div>
      <div id="top-right">
        <div id="watching-users"></div>
        <div id="top-clock"></div>
      </div>
    </div>
    <div id="info-panel">
      <div id="show-info" class="fade"></div>
      <div id="title" class="fade">—</div>
      <div id="tagline" class="fade"></div>
      <div id="meta-row" class="fade">
        <div class="chip chip-accent" id="year">—</div>
        <div class="chip chip-plain" id="genre">—</div>
        <div class="chip chip-plain" id="runtime">—</div>
        <div class="chip chip-accent" id="pg-rating">—</div>
        <div class="chip chip-quality" id="quality-chip">—</div>
      </div>
      <div id="overview" class="fade"></div>
      <div id="crew-cast-row" class="fade"></div>
      <div id="rating-row" class="fade">
        <div id="stars"></div>
        <div id="rating-val"></div>
        <div id="trailer-qr"><canvas id="qr-canvas" width="48" height="48"></canvas><div id="trailer-label">Trailer</div></div>
      </div>
      <div id="up-next" class="fade">
        <img id="up-next-poster" src="" alt="" />
        <div id="up-next-info">
          <div id="up-next-label">Up Next</div>
          <div id="up-next-title"></div>
          <div id="up-next-sub"></div>
        </div>
      </div>
      <div class="progress-times fade">
        <span class="progress-time" id="time-current">0:00</span>
        <span class="progress-time" id="time-total">0:00</span>
      </div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
  </div>

  <!-- QR library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <script>
    // ════════════════════════════════
    // SETTINGS
    // ════════════════════════════════
    const DEFAULTS = {
      accent: '#c9a84c', quality: '#5dade2',
      city: '', units: 'C',
      screensaver: true, ssDelay: 300,
      dim: 1800, trailer: true, upnext: true,
    };

    function loadSettings() {
      try { return { ...DEFAULTS, ...JSON.parse(localStorage.getItem('jp-settings') || '{}') }; }
      catch { return { ...DEFAULTS }; }
    }
    function saveSettings() { try { localStorage.setItem('jp-settings', JSON.stringify(S)); } catch {} }

    let S = loadSettings();

    function hexToRgb(h) {
      const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
      return `${r},${g},${b}`;
    }

    function applySettings() {
      document.documentElement.style.setProperty('--accent', S.accent);
      document.documentElement.style.setProperty('--quality', S.quality);
      document.getElementById('pick-accent').value = S.accent;
      document.getElementById('pick-quality').value = S.quality;
      document.getElementById('pick-city').value = S.city || '';
      document.getElementById('pick-units').value = S.units || 'C';
      document.getElementById('pick-screensaver').checked = S.screensaver !== false;
      document.getElementById('pick-ss-delay').value = S.ssDelay || 300;
      document.getElementById('pick-dim').value = S.dim || 1800;
      document.getElementById('pick-trailer').checked = S.trailer !== false;
      document.getElementById('pick-upnext').checked = S.upnext !== false;

      const aRgb = hexToRgb(S.accent);
      const qRgb = hexToRgb(S.quality);
      document.querySelectorAll('.chip-accent').forEach(c => {
        c.style.color = S.accent;
        c.style.background = `rgba(${aRgb},0.12)`;
        c.style.borderColor = `rgba(${aRgb},0.25)`;
      });
      const qc = document.getElementById('quality-chip');
      if (qc) { qc.style.color = S.quality; qc.style.background = `rgba(${qRgb},0.12)`; qc.style.borderColor = `rgba(${qRgb},0.22)`; }
    }

    applySettings();

    // Settings panel
    const settingsBtn = document.getElementById('settings-btn');
    const settingsPanel = document.getElementById('settings-panel');
    let settingsHideTimer;

    function showSettingsBtn() {
      settingsBtn.classList.add('visible');
      clearTimeout(settingsHideTimer);
      settingsHideTimer = setTimeout(() => { if (!settingsPanel.classList.contains('open')) settingsBtn.classList.remove('visible'); }, 4000);
    }

    document.addEventListener('mousemove', showSettingsBtn);
    document.addEventListener('touchstart', showSettingsBtn);
    showSettingsBtn();

    settingsBtn.addEventListener('click', () => {
      settingsPanel.classList.toggle('open');
      settingsBtn.classList.add('visible');
      clearTimeout(settingsHideTimer);
    });
    document.addEventListener('click', e => {
      if (!settingsPanel.contains(e.target) && e.target !== settingsBtn) {
        settingsPanel.classList.remove('open');
        showSettingsBtn();
      }
    });

    function bindSetting(id, key, transform) {
      document.getElementById(id).addEventListener('change', e => {
        S[key] = transform ? transform(e.target.value) : e.target.value;
        saveSettings(); applySettings();
        if (key === 'city') loadWeather();
      });
    }
    bindSetting('pick-accent', 'accent');
    document.getElementById('pick-accent').addEventListener('input', e => { S.accent = e.target.value; applySettings(); });
    bindSetting('pick-quality', 'quality');
    document.getElementById('pick-quality').addEventListener('input', e => { S.quality = e.target.value; applySettings(); });
    bindSetting('pick-city', 'city');
    bindSetting('pick-units', 'units');
    bindSetting('pick-screensaver', 'screensaver', v => document.getElementById('pick-screensaver').checked);
    bindSetting('pick-ss-delay', 'ssDelay', v => parseInt(v));
    bindSetting('pick-dim', 'dim', v => parseInt(v));
    bindSetting('pick-trailer', 'trailer', v => document.getElementById('pick-trailer').checked);
    bindSetting('pick-upnext', 'upnext', v => document.getElementById('pick-upnext').checked);
    document.getElementById('settings-reset').addEventListener('click', () => { S = { ...DEFAULTS }; saveSettings(); applySettings(); loadWeather(); });

    // ════════════════════════════════
    // CLOCK
    // ════════════════════════════════
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('top-clock').textContent = time;
      document.getElementById('idle-clock').textContent = time;
      document.getElementById('idle-date').textContent = date;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ════════════════════════════════
    // WEATHER
    // ════════════════════════════════
    function weatherIcon(code) {
      if (code === 113) return '☀️';
      if (code === 116) return '⛅';
      if ([119,122].includes(code)) return '☁️';
      if ([143,248,260].includes(code)) return '🌫️';
      if ([176,293,296,299,302,305,308].includes(code)) return '🌧️';
      if ([179,323,326,329,332,335,338,350,368,371].includes(code)) return '❄️';
      if ([200,386,389,392,395].includes(code)) return '⛈️';
      return '🌡️';
    }

    async function loadWeather() {
      const city = S.city;
      if (!city) { document.getElementById('weather-widget').classList.remove('loaded'); return; }
      try {
        const res = await fetch(`/api/weather?city=${encodeURIComponent(city)}`);
        const data = await res.json();
        if (!data) return;
        const temp = S.units === 'F' ? `${data.tempF}°F` : `${data.temp}°C`;
        document.getElementById('weather-icon').textContent = weatherIcon(data.code);
        document.getElementById('weather-temp').textContent = temp;
        document.getElementById('weather-desc').textContent = data.desc;
        document.getElementById('weather-widget').classList.add('loaded');
      } catch (e) { console.warn('Weather error:', e); }
    }
    loadWeather();
    setInterval(loadWeather, 15 * 60 * 1000);

    // ════════════════════════════════
    // SCREENSAVER
    // ════════════════════════════════
    let ssItems = [];
    let ssIndex = 0;
    let ssTimer = null;
    let ssProgressTimer = null;
    let idleSeconds = 0;
    let ssActive = false;

    function startScreensaver() {
      if (!S.screensaver || !ssItems.length) return;
      ssActive = true;
      document.getElementById('screensaver').classList.add('visible');
      showSSSlide(ssIndex);
    }

    function stopScreensaver() {
      ssActive = false;
      document.getElementById('screensaver').classList.remove('visible');
      clearTimeout(ssTimer);
      clearInterval(ssProgressTimer);
      document.getElementById('ss-progress').style.width = '0%';
    }

    function showSSSlide(idx) {
      const item = ssItems[idx % ssItems.length];
      if (!item) return;
      const bg = document.getElementById('ss-bg');
      bg.style.backgroundImage = item.backdropUrl ? `url('${item.backdropUrl}')` : '';
      document.getElementById('ss-title').textContent = item.title || '';
      document.getElementById('ss-meta').textContent = [item.year, item.genre].filter(Boolean).join(' · ');
      document.getElementById('ss-overview').textContent = item.overview || '';

      // Progress bar
      let pct = 0;
      clearInterval(ssProgressTimer);
      document.getElementById('ss-progress').style.width = '0%';
      const delay = (S.ssDelay || 300) * 1000;
      const interval = 100;
      ssProgressTimer = setInterval(() => {
        pct += (interval / delay) * 100;
        document.getElementById('ss-progress').style.width = Math.min(pct, 100) + '%';
      }, interval);

      clearTimeout(ssTimer);
      ssTimer = setTimeout(() => {
        ssIndex = (ssIndex + 1) % ssItems.length;
        showSSSlide(ssIndex);
      }, delay);
    }

    // ════════════════════════════════
    // DIM
    // ════════════════════════════════
    let dimTimer = null;
    function resetDimTimer() {
      clearTimeout(dimTimer);
      document.getElementById('dim-overlay').classList.remove('dimmed');
      if (S.dim > 0) {
        dimTimer = setTimeout(() => document.getElementById('dim-overlay').classList.add('dimmed'), S.dim * 1000);
      }
    }
    document.getElementById('dim-overlay').addEventListener('click', resetDimTimer);
    document.addEventListener('mousemove', resetDimTimer);
    document.addEventListener('touchstart', resetDimTimer);
    resetDimTimer();

    // ════════════════════════════════
    // IDLE TIMER (screensaver trigger)
    // ════════════════════════════════
    let idleTimer = null;
    function resetIdleTimer() {
      clearTimeout(idleTimer);
      if (isIdle && S.screensaver && ssItems.length) {
        idleTimer = setTimeout(startScreensaver, (S.ssDelay || 300) * 1000);
      }
    }

    // ════════════════════════════════
    // QR CODE
    // ════════════════════════════════
    let qrInstance = null;
    function renderQR(trailerKey) {
      const wrap = document.getElementById('trailer-qr');
      const canvas = document.getElementById('qr-canvas');
      if (!trailerKey || !S.trailer) { wrap.classList.remove('visible'); return; }
      wrap.classList.add('visible');
      const qrUrl = `https://youtube.com/watch?v=${trailerKey}`;
      try {
        if (qrInstance) { qrInstance.clear(); qrInstance.makeCode(qrUrl); }
        else { qrInstance = new QRCode(canvas, { text: qrUrl, width: 48, height: 48, colorDark: '#c9a84c', colorLight: '#0a0804', correctLevel: QRCode.CorrectLevel.L }); }
      } catch (e) {}
    }

    // ════════════════════════════════
    // HELPERS
    // ════════════════════════════════
    function formatMs(ms) {
      const s = Math.floor(ms / 1000), h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
      return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
    }
    function starsFromRating(r) { if (!r) return ''; const n = Math.round(r/2); return '★'.repeat(n)+'☆'.repeat(5-n); }
    function qualityLabel(streams) {
      if (!streams) return null;
      const v = streams.find(s => s.Type === 'Video'); if (!v) return null;
      const h = v.Height || 0;
      if (h >= 2160) return '4K UHD'; if (h >= 1080) return '1080p'; if (h >= 720) return '720p'; if (h >= 480) return '480p'; return `${h}p`;
    }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' }) : ''; }

    // ════════════════════════════════
    // POSTER CARDS
    // ════════════════════════════════
    function makePosterCard(posterUrl, title, meta, extra) {
      const card = document.createElement('div'); card.className = 'poster-card';
      if (posterUrl) {
        const img = document.createElement('img'); img.className = 'poster-card-img'; img.src = posterUrl; img.alt = title;
        img.onerror = () => img.replaceWith(makePlaceholder()); card.appendChild(img);
      } else { card.appendChild(makePlaceholder()); }
      const t = document.createElement('div'); t.className = 'poster-card-title'; t.textContent = title; card.appendChild(t);
      if (meta) { const m = document.createElement('div'); m.className = 'poster-card-meta'; m.textContent = meta; card.appendChild(m); }
      if (extra) { const e = document.createElement('div'); e.className = 'poster-card-date'; e.textContent = extra; card.appendChild(e); }
      return card;
    }
    function makePlaceholder() { const el = document.createElement('div'); el.className = 'poster-card-placeholder'; el.textContent = 'NO IMG'; return el; }

    // ════════════════════════════════
    // RECENTLY ADDED
    // ════════════════════════════════
    async function loadRecentlyAdded() {
      try {
        const res = await fetch('/api/recently-added'); const items = await res.json();
        const row = document.getElementById('recently-added-row'); row.innerHTML = '';
        if (!items.length) { row.innerHTML = '<div class="no-data">No recently added movies found</div>'; return; }
        ssItems = items;
        items.forEach(item => row.appendChild(makePosterCard(item.posterUrl, item.title, [item.year, item.genre].filter(Boolean).join(' · '), null)));
      } catch (e) { console.warn('Recently added error:', e); }
    }

    // ════════════════════════════════
    // COMING SOON
    // ════════════════════════════════
    async function loadComingSoon() {
      try {
        const res = await fetch('/api/coming-soon'); const items = await res.json();
        const row = document.getElementById('coming-soon-row'); row.innerHTML = '';
        if (!items.length) { row.innerHTML = '<div class="no-data">Set TMDB_API_KEY to enable coming soon</div>'; return; }
        items.forEach(item => row.appendChild(makePosterCard(item.posterUrl, item.title, item.score ? `★ ${item.score.toFixed(1)}` : '', formatDate(item.releaseDate))));
      } catch (e) { console.warn('Coming soon error:', e); }
    }

    // ════════════════════════════════
    // CREW / CAST ROW
    // ════════════════════════════════
    function renderCrewCast(people, director) {
      const row = document.getElementById('crew-cast-row'); row.innerHTML = '';
      if (director) {
        const dl = document.createElement('span'); dl.className = 'crew-label'; dl.textContent = 'Dir.'; row.appendChild(dl);
        const dn = document.createElement('span'); dn.className = 'director-name'; dn.textContent = director; row.appendChild(dn);
        if (people && people.filter(p => p.Type === 'Actor').length) {
          const sep = document.createElement('div'); sep.className = 'crew-sep-big'; row.appendChild(sep);
        }
      }
      const actors = (people || []).filter(p => p.Type === 'Actor').slice(0, 3);
      if (actors.length) {
        const cl = document.createElement('span'); cl.className = 'crew-label'; cl.textContent = 'Cast'; row.appendChild(cl);
        actors.forEach((a, i) => {
          const n = document.createElement('span'); n.className = 'cast-name'; n.textContent = a.Name; row.appendChild(n);
          if (i < actors.length - 1) { const s = document.createElement('span'); s.className = 'cast-sep'; s.textContent = '·'; row.appendChild(s); }
        });
      }
    }

    // ════════════════════════════════
    // NOW PLAYING
    // ════════════════════════════════
    let lastItemId = null;
    let isIdle = true;

    function showIdle() {
      isIdle = true;
      document.getElementById('idle').classList.add('visible');
      document.getElementById('now-playing').classList.remove('visible');
      document.getElementById('backdrop').style.backgroundImage = '';
      lastItemId = null;
      resetIdleTimer();
    }

    function updateProgress(pos, runtime) {
      if (!runtime) return;
      document.getElementById('progress-fill').style.width = Math.min(100, (pos/runtime)*100) + '%';
      document.getElementById('time-current').textContent = formatMs(pos/10000);
      document.getElementById('time-total').textContent = formatMs(runtime/10000);
    }

    function showNowPlaying(data) {
      const { item, positionTicks, runtimeTicks, isPaused, director, trailerKey, nextUp, allUsers } = data;
      const isNew = item.Id !== lastItemId;
      isIdle = false;
      lastItemId = item.Id;

      stopScreensaver();
      document.getElementById('idle').classList.remove('visible');
      document.getElementById('now-playing').classList.add('visible');

      // Paused state
      document.getElementById('paused-overlay').classList.toggle('visible', isPaused);

      // Watching users
      const usersEl = document.getElementById('watching-users');
      usersEl.textContent = allUsers && allUsers.length ? allUsers.join(', ') : '';

      if (isNew) {
        document.querySelectorAll('.fade').forEach(el => el.classList.add('out'));
        setTimeout(() => {
          if (item.backdropUrl) document.getElementById('backdrop').style.backgroundImage = `url('${item.backdropUrl}')`;
          const posterEl = document.getElementById('poster');
          posterEl.classList.add('hidden');
          if (item.posterUrl) { posterEl.onload = () => posterEl.classList.remove('hidden'); posterEl.src = item.posterUrl; }

          // TV show info
          const showInfoEl = document.getElementById('show-info');
          if (item.Type === 'Episode') {
            const ep = `S${String(item.ParentIndexNumber||0).padStart(2,'0')}E${String(item.IndexNumber||0).padStart(2,'0')}`;
            showInfoEl.textContent = `${item.SeriesName || ''} · ${ep}`;
            document.getElementById('title').textContent = item.Name || '—';
          } else {
            showInfoEl.textContent = '';
            document.getElementById('title').textContent = item.Name || '—';
          }

          document.getElementById('tagline').textContent = item.Taglines?.[0] || '';
          document.getElementById('year').textContent = item.ProductionYear || '—';
          document.getElementById('genre').textContent = (item.Genres||[]).slice(0,2).join(' / ') || '—';
          document.getElementById('runtime').textContent = item.RunTimeTicks ? `${Math.floor(item.RunTimeTicks/600000000)} min` : '—';
          document.getElementById('pg-rating').textContent = item.OfficialRating || '—';
          document.getElementById('quality-chip').textContent = qualityLabel(item.MediaStreams) || '—';
          document.getElementById('overview').textContent = item.Overview || '';

          renderCrewCast(item.People, director);

          const score = item.CommunityRating;
          document.getElementById('stars').textContent = starsFromRating(score);
          document.getElementById('rating-val').textContent = score ? `${score.toFixed(1)} / 10` : '';

          renderQR(trailerKey);

          // Up next
          const upNextEl = document.getElementById('up-next');
          if (nextUp && S.upnext) {
            upNextEl.classList.add('visible');
            document.getElementById('up-next-title').textContent = nextUp.title || '';
            document.getElementById('up-next-sub').textContent = nextUp.subtitle || '';
            const upImg = document.getElementById('up-next-poster');
            upImg.src = nextUp.posterUrl || '';
          } else { upNextEl.classList.remove('visible'); }

          applySettings();
          document.querySelectorAll('.fade').forEach(el => el.classList.remove('out'));
        }, 500);
      }

      updateProgress(positionTicks, runtimeTicks || item.RunTimeTicks);
    }

    // ════════════════════════════════
    // POLL
    // ════════════════════════════════
    async function poll() {
      try {
        const res = await fetch('/api/now-playing');
        const data = await res.json();
        if (data) { showNowPlaying(data); }
        else {
          if (!isIdle) showIdle();
          else if (ssActive) {} // screensaver running, leave it
        }
      } catch (e) { console.warn('Poll error:', e); }
    }

    // ════════════════════════════════
    // INIT
    // ════════════════════════════════
    poll();
    setInterval(poll, 5000);
    loadRecentlyAdded();
    loadComingSoon();
    setInterval(loadRecentlyAdded, 5 * 60 * 1000);
    setInterval(loadComingSoon, 5 * 60 * 1000);
  </script>
</body>
</html>
