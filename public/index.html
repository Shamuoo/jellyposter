<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyPoster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --accent: #c9a84c;
      --quality: #5dade2;
      --dark: #0a0804;
      --cream: #f0e8d5;
      --red: #8b1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: var(--dark); color: var(--cream); font-family: 'Montserrat', sans-serif; overflow: hidden; }

    /* ── Backdrop ── */
    #backdrop {
      position: fixed; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(80px) brightness(0.18) saturate(1.6);
      transform: scale(1.15);
      transition: background-image 1.8s ease;
      z-index: 0;
    }
    #grain {
      position: fixed; inset: 0; opacity: 0.03; z-index: 2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 150px; animation: grain 0.3s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{background-position:0 0} 10%{background-position:-5% -10%} 20%{background-position:-15% 5%}
      30%{background-position:7% -25%} 40%{background-position:-5% 25%} 50%{background-position:-15% 10%}
      60%{background-position:15% 0%} 70%{background-position:0 15%} 80%{background-position:3% 35%} 90%{background-position:-10% 10%}
    }

    /* ════════════════════════════════
       SETTINGS BUTTON
    ════════════════════════════════ */
    #settings-btn {
      position: fixed; bottom: 28px; right: 28px;
      z-index: 100;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(10,8,4,0.7);
      border: 1px solid rgba(201,168,76,0.2);
      color: var(--accent);
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      opacity: 0.4;
      transition: opacity 0.2s ease, border-color 0.2s ease;
      backdrop-filter: blur(8px);
    }
    #settings-btn:hover { opacity: 1; border-color: rgba(201,168,76,0.5); }

    /* ════════════════════════════════
       SETTINGS PANEL
    ════════════════════════════════ */
    #settings-panel {
      position: fixed; bottom: 80px; right: 28px;
      z-index: 100;
      width: 260px;
      background: rgba(12, 10, 6, 0.96);
      border: 1px solid rgba(201,168,76,0.15);
      border-radius: 12px;
      padding: 20px;
      backdrop-filter: blur(20px);
      opacity: 0; pointer-events: none;
      transform: translateY(10px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #settings-panel.open { opacity: 1; pointer-events: all; transform: translateY(0); }

    .settings-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px; letter-spacing: 0.4em;
      color: var(--accent); opacity: 0.8;
      margin-bottom: 18px;
    }
    .settings-row {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .settings-label {
      font-size: 10px; font-weight: 600;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--cream); opacity: 0.45;
    }
    .settings-row input[type=color] {
      width: 48px; height: 28px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      cursor: pointer; padding: 2px;
    }
    .settings-divider { height: 1px; background: rgba(201,168,76,0.08); margin: 16px 0; }
    .settings-reset {
      width: 100%; padding: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: rgba(240,232,213,0.4);
      font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;
      cursor: pointer; transition: background 0.2s;
    }
    .settings-reset:hover { background: rgba(255,255,255,0.08); }

    /* ════════════════════════════════
       IDLE SCREEN
    ════════════════════════════════ */
    #idle {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      opacity: 0; transition: opacity 1s ease;
      pointer-events: none; overflow: hidden;
    }
    #idle.visible { opacity: 1; pointer-events: all; }

    #idle-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 32px 52px 24px; flex-shrink: 0;
    }
    #idle-logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 14px; letter-spacing: 0.5em;
      color: var(--accent); opacity: 0.45;
    }
    .idle-clock-wrap { text-align: right; }
    #idle-clock {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(32px, 4vw, 56px); font-weight: 300;
      color: var(--cream); opacity: 0.18; letter-spacing: 0.06em; line-height: 1;
    }
    #idle-date {
      font-size: 10px; font-weight: 300; letter-spacing: 0.35em;
      color: var(--cream); opacity: 0.1; text-transform: uppercase; margin-top: 3px;
    }

    .idle-divider { height: 1px; background: var(--accent); opacity: 0.07; margin: 0 52px; }

    .idle-section { padding: 22px 52px 0; flex-shrink: 0; }
    .idle-section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 10px; letter-spacing: 0.5em;
      color: var(--accent); opacity: 0.55;
      margin-bottom: 16px;
      display: flex; align-items: center; gap: 12px;
    }
    .idle-section-label::after { content: ''; flex: 1; height: 1px; background: var(--accent); opacity: 0.12; }

    .poster-row { display: flex; gap: 14px; overflow: hidden; }

    .poster-card { flex-shrink: 0; width: 100px; }
    .poster-card-img {
      width: 100px; height: 150px; object-fit: cover; display: block;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.07);
      background: #1a1510;
      transition: transform 0.3s ease;
    }
    .poster-card:hover .poster-card-img { transform: translateY(-3px); }
    .poster-card-placeholder {
      width: 100px; height: 150px; border-radius: 4px;
      background: #1a1510; border: 1px solid rgba(255,255,255,0.05);
      display: flex; align-items: center; justify-content: center;
      font-size: 8px; letter-spacing: 0.2em; color: #3a3020;
      font-family: 'Bebas Neue', sans-serif;
    }
    .poster-card-title {
      font-size: 9px; font-weight: 700;
      color: var(--cream); opacity: 0.65;
      margin-top: 7px; line-height: 1.3;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      letter-spacing: 0.02em;
    }
    .poster-card-meta { font-size: 8px; font-weight: 300; color: var(--cream); opacity: 0.3; margin-top: 2px; letter-spacing: 0.05em; }
    .poster-card-date { font-size: 8px; font-weight: 600; color: var(--accent); opacity: 0.65; margin-top: 2px; letter-spacing: 0.05em; }

    .no-data { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--cream); opacity: 0.18; padding: 16px 0; }

    /* ════════════════════════════════
       NOW PLAYING
    ════════════════════════════════ */
    #now-playing {
      position: fixed; inset: 0; z-index: 5;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #now-playing.visible { opacity: 1; }

    #poster-container { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    #poster { height: 100vh; width: auto; max-width: 100vw; object-fit: cover; display: block; filter: brightness(0.85); transition: opacity 0.6s ease; }
    #poster.hidden { opacity: 0; }

    #poster-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        rgba(0,0,0,0.3) 0%,
        transparent 18%,
        transparent 38%,
        rgba(0,0,0,0.6) 58%,
        rgba(0,0,0,0.95) 78%,
        rgba(0,0,0,1) 100%
      );
    }

    /* ── Top bar ── */
    #top-bar {
      position: absolute; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 26px 44px; z-index: 6;
    }
    .now-playing-badge {
      display: flex; align-items: center; gap: 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px; letter-spacing: 0.5em; color: var(--accent);
    }
    .pulse-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--red); box-shadow: 0 0 10px var(--red);
      animation: pulse 2s ease-in-out infinite; flex-shrink: 0;
    }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }
    #top-clock { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 15px; color: var(--cream); opacity: 0.35; letter-spacing: 0.1em; }

    /* ── Info panel ── */
    #info-panel { position: absolute; bottom: 0; left: 0; right: 0; padding: 0 52px 40px; z-index: 6; }

    #title {
      font-family: 'Montserrat', sans-serif;
      font-size: clamp(40px, 6vw, 88px);
      font-weight: 800; line-height: 0.95;
      letter-spacing: -1px; color: #fff;
      margin-bottom: 7px;
      text-shadow: 0 2px 40px rgba(0,0,0,0.9);
    }
    #tagline {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 15px;
      color: var(--accent); opacity: 0.8;
      margin-bottom: 16px; min-height: 20px;
    }

    #meta-row { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; margin-bottom: 13px; }
    .chip {
      font-size: 8px; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 4px 10px; border-radius: 2px; white-space: nowrap;
    }
    .chip-accent {
      background: rgba(201,168,76,0.12);
      color: var(--accent);
      border: 1px solid rgba(201,168,76,0.25);
    }
    .chip-plain {
      background: rgba(255,255,255,0.05);
      color: rgba(240,232,213,0.55);
      border: 1px solid rgba(255,255,255,0.08);
      font-weight: 400;
    }
    .chip-quality {
      background: rgba(93,173,226,0.12);
      color: var(--quality);
      border: 1px solid rgba(93,173,226,0.25);
    }

    #overview {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px; line-height: 1.65;
      color: var(--cream); opacity: 0.5;
      max-width: 640px; margin-bottom: 12px;
      display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
    }

    #cast-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; flex-wrap: wrap; }
    .cast-label { font-size: 8px; font-weight: 700; letter-spacing: 0.3em; text-transform: uppercase; color: var(--accent); opacity: 0.5; margin-right: 2px; }
    .cast-name { font-family: 'Cormorant Garamond', serif; font-size: 14px; color: var(--cream); opacity: 0.4; }
    .cast-sep { color: var(--accent); opacity: 0.2; font-size: 12px; }

    #rating-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    #stars { color: var(--accent); font-size: 12px; letter-spacing: 2px; }
    #rating-val { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--cream); opacity: 0.3; }

    .progress-times { display: flex; justify-content: space-between; margin-bottom: 7px; }
    .progress-time { font-size: 9px; letter-spacing: 0.15em; color: var(--cream); opacity: 0.28; font-weight: 300; }
    #progress-track { width: 100%; height: 3px; background: rgba(255,255,255,0.06); border-radius: 2px; }
    #progress-fill {
      height: 100%; border-radius: 2px;
      background: var(--accent);
      width: 0%; transition: width 4s linear; position: relative;
    }
    #progress-fill::after {
      content: ''; position: absolute; right: -4px; top: -3px;
      width: 9px; height: 9px; background: var(--accent); border-radius: 50%;
      box-shadow: 0 0 8px var(--accent);
    }

    .fade { transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade.out { opacity: 0; transform: translateY(6px); }
  </style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="grain"></div>

  <!-- Settings button -->
  <button id="settings-btn" title="Settings">⚙</button>

  <!-- Settings panel -->
  <div id="settings-panel">
    <div class="settings-title">Display Settings</div>

    <div class="settings-row">
      <span class="settings-label">Accent colour</span>
      <input type="color" id="pick-accent" value="#c9a84c" />
    </div>
    <div class="settings-row">
      <span class="settings-label">Quality badge</span>
      <input type="color" id="pick-quality" value="#5dade2" />
    </div>

    <div class="settings-divider"></div>
    <button class="settings-reset" id="settings-reset">Reset to defaults</button>
  </div>

  <!-- Idle -->
  <div id="idle" class="visible">
    <div id="idle-header">
      <div id="idle-logo">JellyPoster</div>
      <div class="idle-clock-wrap">
        <div id="idle-clock">00:00</div>
        <div id="idle-date"></div>
      </div>
    </div>
    <div class="idle-divider"></div>
    <div class="idle-section">
      <div class="idle-section-label">Recently Added</div>
      <div class="poster-row" id="recently-added-row"></div>
    </div>
    <div class="idle-section" style="margin-top: 22px;">
      <div class="idle-section-label">Coming Soon</div>
      <div class="poster-row" id="coming-soon-row"></div>
    </div>
  </div>

  <!-- Now Playing -->
  <div id="now-playing">
    <div id="poster-container">
      <img id="poster" src="" alt="" class="hidden" />
      <div id="poster-overlay"></div>
    </div>
    <div id="top-bar">
      <div class="now-playing-badge"><div class="pulse-dot"></div>Now Playing</div>
      <div id="top-clock"></div>
    </div>
    <div id="info-panel">
      <div id="title" class="fade">—</div>
      <div id="tagline" class="fade"></div>
      <div id="meta-row" class="fade">
        <div class="chip chip-accent" id="year">—</div>
        <div class="chip chip-plain" id="genre">—</div>
        <div class="chip chip-plain" id="runtime">—</div>
        <div class="chip chip-accent" id="pg-rating">—</div>
        <div class="chip chip-quality" id="quality-chip">—</div>
      </div>
      <div id="overview" class="fade"></div>
      <div id="cast-row" class="fade"></div>
      <div id="rating-row" class="fade">
        <div id="stars"></div>
        <div id="rating-val"></div>
      </div>
      <div class="progress-times fade">
        <span class="progress-time" id="time-current">0:00</span>
        <span class="progress-time" id="time-total">0:00</span>
      </div>
      <div id="progress-track"><div id="progress-fill"></div></div>
    </div>
  </div>

  <script>
    // ── Settings ──
    const DEFAULTS = { accent: '#c9a84c', quality: '#5dade2' };

    function loadSettings() {
      try {
        return JSON.parse(localStorage.getItem('jp-settings') || '{}');
      } catch { return {}; }
    }
    function saveSettings(s) {
      try { localStorage.setItem('jp-settings', JSON.stringify(s)); } catch {}
    }
    function applySettings(s) {
      const accent = s.accent || DEFAULTS.accent;
      const quality = s.quality || DEFAULTS.quality;
      document.documentElement.style.setProperty('--accent', accent);
      document.documentElement.style.setProperty('--quality', quality);
      document.getElementById('pick-accent').value = accent;
      document.getElementById('pick-quality').value = quality;

      // Update quality chip border/bg dynamically
      function hexToRgb(h) {
        const r = parseInt(h.slice(1,3),16), g = parseInt(h.slice(3,5),16), b = parseInt(h.slice(5,7),16);
        return `${r},${g},${b}`;
      }
      const qChip = document.getElementById('quality-chip');
      const qRgb = hexToRgb(quality);
      qChip.style.color = quality;
      qChip.style.background = `rgba(${qRgb},0.12)`;
      qChip.style.borderColor = `rgba(${qRgb},0.25)`;

      const aChips = document.querySelectorAll('.chip-accent');
      const aRgb = hexToRgb(accent);
      aChips.forEach(c => {
        c.style.color = accent;
        c.style.background = `rgba(${aRgb},0.12)`;
        c.style.borderColor = `rgba(${aRgb},0.25)`;
      });
    }

    let settings = { ...DEFAULTS, ...loadSettings() };
    applySettings(settings);

    // Settings panel toggle
    const btn = document.getElementById('settings-btn');
    const panel = document.getElementById('settings-panel');
    btn.addEventListener('click', () => panel.classList.toggle('open'));
    document.addEventListener('click', e => {
      if (!panel.contains(e.target) && e.target !== btn) panel.classList.remove('open');
    });

    document.getElementById('pick-accent').addEventListener('input', e => {
      settings.accent = e.target.value;
      saveSettings(settings); applySettings(settings);
    });
    document.getElementById('pick-quality').addEventListener('input', e => {
      settings.quality = e.target.value;
      saveSettings(settings); applySettings(settings);
    });
    document.getElementById('settings-reset').addEventListener('click', () => {
      settings = { ...DEFAULTS };
      saveSettings(settings); applySettings(settings);
    });

    // ── Clock ──
    function updateClock() {
      const now = new Date();
      const time = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
      const date = now.toLocaleDateString([], { weekday: 'long', month: 'long', day: 'numeric' });
      document.getElementById('top-clock').textContent = time;
      document.getElementById('idle-clock').textContent = time;
      document.getElementById('idle-date').textContent = date;
    }
    updateClock();
    setInterval(updateClock, 1000);

    // ── Helpers ──
    function formatMs(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
    }
    function starsFromRating(r) {
      if (!r) return '';
      const n = Math.round(r / 2);
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }
    function qualityLabel(streams) {
      if (!streams) return null;
      const v = streams.find(s => s.Type === 'Video');
      if (!v) return null;
      const h = v.Height || 0;
      if (h >= 2160) return '4K UHD';
      if (h >= 1080) return '1080p';
      if (h >= 720) return '720p';
      if (h >= 480) return '480p';
      return `${h}p`;
    }
    function formatReleaseDate(d) {
      if (!d) return '';
      return new Date(d).toLocaleDateString([], { month: 'short', day: 'numeric', year: 'numeric' });
    }

    // ── Poster card ──
    function makePosterCard(posterUrl, title, meta, extra) {
      const card = document.createElement('div');
      card.className = 'poster-card';
      if (posterUrl) {
        const img = document.createElement('img');
        img.className = 'poster-card-img';
        img.src = posterUrl; img.alt = title;
        img.onerror = () => img.replaceWith(makePlaceholder());
        card.appendChild(img);
      } else {
        card.appendChild(makePlaceholder());
      }
      const t = document.createElement('div');
      t.className = 'poster-card-title'; t.textContent = title;
      card.appendChild(t);
      if (meta) {
        const m = document.createElement('div');
        m.className = 'poster-card-meta'; m.textContent = meta;
        card.appendChild(m);
      }
      if (extra) {
        const e = document.createElement('div');
        e.className = 'poster-card-date'; e.textContent = extra;
        card.appendChild(e);
      }
      return card;
    }
    function makePlaceholder() {
      const el = document.createElement('div');
      el.className = 'poster-card-placeholder';
      el.textContent = 'NO IMG';
      return el;
    }

    // ── Recently added ──
    async function loadRecentlyAdded() {
      try {
        const res = await fetch('/api/recently-added');
        const items = await res.json();
        const row = document.getElementById('recently-added-row');
        row.innerHTML = '';
        if (!items.length) { row.innerHTML = '<div class="no-data">No recently added movies found</div>'; return; }
        items.forEach(item => {
          row.appendChild(makePosterCard(item.posterUrl, item.title, [item.year, item.genre].filter(Boolean).join(' · '), null));
        });
      } catch (e) { console.warn('Recently added error:', e); }
    }

    // ── Coming soon ──
    async function loadComingSoon() {
      try {
        const res = await fetch('/api/coming-soon');
        const items = await res.json();
        const row = document.getElementById('coming-soon-row');
        row.innerHTML = '';
        if (!items.length) { row.innerHTML = '<div class="no-data">Set TMDB_API_KEY to enable coming soon</div>'; return; }
        items.forEach(item => {
          row.appendChild(makePosterCard(item.posterUrl, item.title, item.score ? `★ ${item.score.toFixed(1)}` : '', formatReleaseDate(item.releaseDate)));
        });
      } catch (e) { console.warn('Coming soon error:', e); }
    }

    // ── Cast ──
    function renderCast(people) {
      const row = document.getElementById('cast-row');
      row.innerHTML = '';
      const actors = (people || []).filter(p => p.Type === 'Actor').slice(0, 4);
      if (!actors.length) return;
      const label = document.createElement('span');
      label.className = 'cast-label'; label.textContent = 'Starring';
      row.appendChild(label);
      actors.forEach((a, i) => {
        const name = document.createElement('span');
        name.className = 'cast-name'; name.textContent = a.Name;
        row.appendChild(name);
        if (i < actors.length - 1) {
          const sep = document.createElement('span');
          sep.className = 'cast-sep'; sep.textContent = '·';
          row.appendChild(sep);
        }
      });
    }

    // ── Now playing ──
    let lastItemId = null;

    function showIdle() {
      document.getElementById('idle').classList.add('visible');
      document.getElementById('now-playing').classList.remove('visible');
      document.getElementById('backdrop').style.backgroundImage = '';
      lastItemId = null;
    }

    function updateProgress(pos, runtime) {
      if (!runtime) return;
      document.getElementById('progress-fill').style.width = Math.min(100, (pos / runtime) * 100) + '%';
      document.getElementById('time-current').textContent = formatMs(pos / 10000);
      document.getElementById('time-total').textContent = formatMs(runtime / 10000);
    }

    function showNowPlaying(data) {
      const { item, positionTicks, runtimeTicks } = data;
      const isNew = item.Id !== lastItemId;
      lastItemId = item.Id;

      document.getElementById('idle').classList.remove('visible');

      if (isNew) {
        document.querySelectorAll('.fade').forEach(el => el.classList.add('out'));
        setTimeout(() => {
          if (item.backdropUrl) document.getElementById('backdrop').style.backgroundImage = `url('${item.backdropUrl}')`;

          const posterEl = document.getElementById('poster');
          posterEl.classList.add('hidden');
          if (item.posterUrl) {
            posterEl.onload = () => posterEl.classList.remove('hidden');
            posterEl.src = item.posterUrl;
          }

          document.getElementById('title').textContent = item.Name || '—';
          document.getElementById('tagline').textContent = item.Taglines?.[0] || '';
          document.getElementById('year').textContent = item.ProductionYear || '—';
          document.getElementById('genre').textContent = (item.Genres || []).slice(0, 2).join(' / ') || '—';
          document.getElementById('runtime').textContent = item.RunTimeTicks ? `${Math.floor(item.RunTimeTicks / 600000000)} min` : '—';
          document.getElementById('pg-rating').textContent = item.OfficialRating || '—';
          document.getElementById('quality-chip').textContent = qualityLabel(item.MediaStreams) || '—';
          document.getElementById('overview').textContent = item.Overview || '';
          renderCast(item.People);
          const score = item.CommunityRating;
          document.getElementById('stars').textContent = starsFromRating(score);
          document.getElementById('rating-val').textContent = score ? `${score.toFixed(1)} / 10` : '';

          applySettings(settings);
          document.querySelectorAll('.fade').forEach(el => el.classList.remove('out'));
          document.getElementById('now-playing').classList.add('visible');
        }, 500);
      }

      updateProgress(positionTicks, runtimeTicks || item.RunTimeTicks);
    }

    // ── Poll ──
    async function poll() {
      try {
        const res = await fetch('/api/now-playing');
        const data = await res.json();
        data ? showNowPlaying(data) : showIdle();
      } catch (e) { console.warn('Poll error:', e); }
    }

    poll();
    setInterval(poll, 5000);
    loadRecentlyAdded();
    loadComingSoon();
    setInterval(loadRecentlyAdded, 5 * 60 * 1000);
    setInterval(loadComingSoon, 5 * 60 * 1000);
  </script>
</body>
</html>
