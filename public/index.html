<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JellyPoster</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-dim: #8a6a2a;
      --cream: #f0e8d5;
      --dark: #0a0804;
      --red: #8b1a1a;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: var(--dark); color: var(--cream); font-family: 'Montserrat', sans-serif; overflow: hidden; }

    #backdrop {
      position: fixed; inset: 0;
      background-size: cover; background-position: center;
      filter: blur(60px) brightness(0.25) saturate(1.4);
      transform: scale(1.1);
      transition: background-image 1.5s ease;
      z-index: 0;
    }
    #vignette {
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse at center, transparent 30%, rgba(0,0,0,0.85) 100%),
        linear-gradient(to bottom, rgba(0,0,0,0.6) 0%, transparent 20%, transparent 70%, rgba(0,0,0,0.9) 100%);
      z-index: 1;
    }
    #grain {
      position: fixed; inset: 0; opacity: 0.04; z-index: 2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 150px;
      animation: grain 0.3s steps(1) infinite;
    }
    @keyframes grain {
      0%,100%{background-position:0 0} 10%{background-position:-5% -10%} 20%{background-position:-15% 5%}
      30%{background-position:7% -25%} 40%{background-position:-5% 25%} 50%{background-position:-15% 10%}
      60%{background-position:15% 0%} 70%{background-position:0 15%} 80%{background-position:3% 35%} 90%{background-position:-10% 10%}
    }

    .deco-line { position: fixed; background: var(--gold); opacity: 0.07; z-index: 3; }
    .deco-line.h { width: 100%; height: 1px; }
    .deco-line.v { width: 1px; height: 100%; }
    .deco-line.top { top: 68px; } .deco-line.bottom { bottom: 40px; }
    .deco-line.left { left: 40px; } .deco-line.right { right: 40px; }

    #header {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; align-items: center; justify-content: space-between;
      padding: 20px 48px; z-index: 10;
    }
    .header-logo { font-family: 'Bebas Neue', sans-serif; font-size: 13px; letter-spacing: 0.4em; color: var(--gold); opacity: 0.7; }
    #clock { font-family: 'Cormorant Garamond', serif; font-size: 15px; font-style: italic; color: var(--cream); opacity: 0.5; letter-spacing: 0.1em; }

    #idle {
      position: fixed; inset: 0; z-index: 5;
      display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
      opacity: 0; transition: opacity 1s ease; pointer-events: none;
    }
    #idle.visible { opacity: 1; pointer-events: all; }
    #idle .logo { font-family: 'Bebas Neue', sans-serif; font-size: clamp(48px, 8vw, 96px); letter-spacing: 0.15em; color: var(--gold); opacity: 0.15; }
    #idle .sub { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--cream); opacity: 0.25; letter-spacing: 0.25em; }

    #main {
      position: relative; z-index: 5;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; padding: 80px 64px; gap: 64px;
      opacity: 0; transition: opacity 0.8s ease;
    }
    #main.visible { opacity: 1; }

    #poster-wrap { flex-shrink: 0; position: relative; width: 280px; }
    #poster-frame { position: absolute; inset: -8px; border: 1px solid var(--gold-dim); opacity: 0.4; }
    #poster-frame::before, #poster-frame::after {
      content: ''; position: absolute; width: 16px; height: 16px;
      border-color: var(--gold); border-style: solid;
    }
    #poster-frame::before { top: -1px; left: -1px; border-width: 2px 0 0 2px; }
    #poster-frame::after  { bottom: -1px; right: -1px; border-width: 0 2px 2px 0; }
    #poster { width: 280px; aspect-ratio: 2/3; object-fit: cover; display: block; box-shadow: 0 32px 80px rgba(0,0,0,0.8); }
    #poster-placeholder { width: 280px; aspect-ratio: 2/3; background: linear-gradient(135deg, #1a1510, #2a2018); display: flex; align-items: center; justify-content: center; color: var(--gold-dim); font-family: 'Bebas Neue', sans-serif; font-size: 14px; letter-spacing: 0.3em; }

    #info { flex: 1; max-width: 600px; display: flex; flex-direction: column; }

    .now-playing-label { font-family: 'Bebas Neue', sans-serif; font-size: 11px; letter-spacing: 0.5em; color: var(--gold); margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }
    .now-playing-label::after { content: ''; display: block; height: 1px; width: 40px; background: var(--gold); opacity: 0.4; }
    .pulse-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--red); box-shadow: 0 0 8px var(--red); animation: pulse 2s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.4;transform:scale(0.7)} }

    #title { font-family: 'Bebas Neue', sans-serif; font-size: clamp(42px, 5.5vw, 78px); line-height: 0.95; letter-spacing: 0.02em; color: var(--cream); margin-bottom: 6px; }
    #tagline { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 16px; color: var(--gold); opacity: 0.75; margin-bottom: 28px; min-height: 22px; }

    .meta-row { display: flex; align-items: center; gap: 20px; margin-bottom: 28px; flex-wrap: wrap; }
    .meta-pill { font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; padding: 5px 14px; border: 1px solid rgba(201,168,76,0.3); color: var(--gold); }
    .meta-item { font-size: 12px; font-weight: 300; letter-spacing: 0.15em; color: var(--cream); opacity: 0.55; text-transform: uppercase; }
    .meta-sep { opacity: 0.2; color: var(--gold); }

    #overview { font-family: 'Cormorant Garamond', serif; font-size: 17px; line-height: 1.7; color: var(--cream); opacity: 0.7; margin-bottom: 28px; max-width: 520px; display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical; overflow: hidden; }

    #rating-wrap { display: flex; align-items: center; gap: 10px; margin-bottom: 32px; }
    #stars { color: var(--gold); font-size: 14px; letter-spacing: 2px; }
    #rating-val { font-family: 'Cormorant Garamond', serif; font-size: 13px; color: var(--cream); opacity: 0.45; font-style: italic; }

    .progress-times { display: flex; justify-content: space-between; margin-bottom: 10px; }
    .progress-time { font-size: 11px; letter-spacing: 0.15em; color: var(--cream); opacity: 0.4; font-weight: 300; }
    #progress-track { width: 100%; height: 2px; background: rgba(255,255,255,0.08); position: relative; }
    #progress-fill { height: 100%; background: linear-gradient(to right, var(--gold-dim), var(--gold)); width: 0%; transition: width 3s linear; position: relative; }
    #progress-fill::after { content: ''; position: absolute; right: -3px; top: -3px; width: 8px; height: 8px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 8px var(--gold); }

    .fade { transition: opacity 0.5s ease, transform 0.5s ease; }
    .fade.out { opacity: 0; transform: translateY(8px); }
  </style>
</head>
<body>
  <div id="backdrop"></div>
  <div id="vignette"></div>
  <div id="grain"></div>
  <div class="deco-line h top"></div>
  <div class="deco-line h bottom"></div>
  <div class="deco-line v left"></div>
  <div class="deco-line v right"></div>

  <div id="header">
    <div class="header-logo">JellyPoster</div>
    <div id="clock"></div>
  </div>

  <div id="idle" class="visible">
    <div class="logo">JELLYPOSTER</div>
    <div class="sub">awaiting feature presentation</div>
  </div>

  <div id="main">
    <div id="poster-wrap">
      <div id="poster-frame"></div>
      <img id="poster" src="" alt="Poster" style="display:none" />
      <div id="poster-placeholder">No Poster</div>
    </div>
    <div id="info">
      <div class="now-playing-label"><div class="pulse-dot"></div>Now Playing</div>
      <div id="title" class="fade">—</div>
      <div id="tagline" class="fade"></div>
      <div class="meta-row fade">
        <div class="meta-pill" id="year">—</div>
        <div class="meta-item" id="genre">—</div>
        <div class="meta-sep">·</div>
        <div class="meta-item" id="runtime">—</div>
        <div class="meta-sep">·</div>
        <div class="meta-item" id="pg-rating">—</div>
      </div>
      <div id="overview" class="fade"></div>
      <div id="rating-wrap" class="fade">
        <div id="stars"></div>
        <div id="rating-val"></div>
      </div>
      <div>
        <div class="progress-times">
          <span class="progress-time" id="time-current">0:00</span>
          <span class="progress-time" id="time-total">0:00</span>
        </div>
        <div id="progress-track"><div id="progress-fill"></div></div>
      </div>
    </div>
  </div>

  <script>
    function updateClock() {
      document.getElementById('clock').textContent =
        new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    updateClock();
    setInterval(updateClock, 1000);

    function formatMs(ms) {
      const s = Math.floor(ms / 1000);
      const h = Math.floor(s / 3600);
      const m = Math.floor((s % 3600) / 60);
      const sec = s % 60;
      return h > 0
        ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`
        : `${m}:${String(sec).padStart(2,'0')}`;
    }

    function starsFromRating(r) {
      if (!r) return '';
      const n = Math.round(r / 2);
      return '★'.repeat(n) + '☆'.repeat(5 - n);
    }

    let lastItemId = null;

    function showIdle() {
      document.getElementById('idle').classList.add('visible');
      document.getElementById('main').classList.remove('visible');
      lastItemId = null;
    }

    function updateProgress(pos, runtime) {
      if (!runtime) return;
      const pct = Math.min(100, (pos / runtime) * 100);
      document.getElementById('progress-fill').style.width = pct + '%';
      document.getElementById('time-current').textContent = formatMs(pos / 10000);
      document.getElementById('time-total').textContent = formatMs(runtime / 10000);
    }

    function showNowPlaying(data) {
      const { item, positionTicks, runtimeTicks } = data;
      const isNew = item.Id !== lastItemId;
      lastItemId = item.Id;

      document.getElementById('idle').classList.remove('visible');

      if (isNew) {
        document.querySelectorAll('.fade').forEach(el => el.classList.add('out'));
        setTimeout(() => {
          document.getElementById('backdrop').style.backgroundImage = item.backdropUrl ? `url('${item.backdropUrl}')` : '';

          const posterEl = document.getElementById('poster');
          const placeholderEl = document.getElementById('poster-placeholder');
          if (item.posterUrl) {
            posterEl.onload = () => { posterEl.style.display = 'block'; placeholderEl.style.display = 'none'; };
            posterEl.onerror = () => { posterEl.style.display = 'none'; placeholderEl.style.display = 'flex'; };
            posterEl.src = item.posterUrl;
          } else {
            posterEl.style.display = 'none';
            placeholderEl.style.display = 'flex';
          }

          document.getElementById('title').textContent = item.Name || '—';
          document.getElementById('tagline').textContent = item.Taglines?.[0] || '';
          document.getElementById('year').textContent = item.ProductionYear || '—';
          document.getElementById('genre').textContent = (item.Genres || []).slice(0, 2).join(' / ') || '—';
          document.getElementById('runtime').textContent = item.RunTimeTicks ? `${Math.floor(item.RunTimeTicks / 600000000)} min` : '—';
          document.getElementById('pg-rating').textContent = item.OfficialRating || '—';
          document.getElementById('overview').textContent = item.Overview || '';
          const score = item.CommunityRating;
          document.getElementById('stars').textContent = starsFromRating(score);
          document.getElementById('rating-val').textContent = score ? `${score.toFixed(1)} / 10` : '';

          document.querySelectorAll('.fade').forEach(el => el.classList.remove('out'));
          document.getElementById('main').classList.add('visible');
        }, 400);
      }

      updateProgress(positionTicks, runtimeTicks || item.RunTimeTicks);
    }

    async function poll() {
      try {
        const res = await fetch('/api/now-playing');
        const data = await res.json();
        data ? showNowPlaying(data) : showIdle();
      } catch (e) {
        console.warn('Poll error:', e);
      }
    }

    poll();
    setInterval(poll, 5000);
  </script>
</body>
</html>
